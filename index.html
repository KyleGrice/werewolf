  const w=["WOLF","MOON","HOWL","FANG","HUNT","SEER","PACK","BITE"];

// ── MINI FRAMEWORK ────────────────────────────────────────────────────────────

function getState(){ return _state; }
function setState(patch){ _state={..._state,...patch}; _subs.forEach(f=>f()); }
function subscribe(fn){ _subs.push(fn); return ()=>{ _subs=_subs.filter(f=>f!==fn); }; }
// setState is redefined after session helpers are declared — see below

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function mount(fn){
  const root=document.getElementById("app");
  let cleanup=null;
  function render(){
    if(cleanup){try{cleanup();}catch(e){}}
    root.innerHTML="";
    cleanup=fn(root)||null;
  }
  render();
  return subscribe(render);
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==="class") e.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null) continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}
function div(cls,children=[]){ return el("div",{class:cls},children); }
function btn(cls,text,onClick){ const b=el("button",{class:cls},[text]); b.onclick=onClick; return b; }
function inp(cls,placeholder,value,onInput,extra={}){
  const i=el("input",{class:cls,placeholder,value:value||"",...extra});
  i.addEventListener("input",e=>onInput(e.target.value));
  return i;
}
function pill(team){

  const s=el("span",{class:`text-xs px-2 py-0.5 rounded-full font-semibold ${c.badge}`},[c.icon+" "+team]);
  return s;
}

  overlay.style.background="rgba(0,0,0,0.85)";
  const box=div("rounded-2xl border-2 max-w-sm w-full p-6 shadow-2xl",[
    div("flex justify-between items-start mb-3",[
      div("",[
        el("h2",{class:`text-2xl font-bold mb-1`,style:{color:c.text}},[card.name]),
        pill(card.team)
      ]),
      btn("text-gray-400 hover:text-white text-2xl ml-4","✕",()=>overlay.remove())
    ]),
    el("p",{class:"text-sm opacity-90 mb-4 leading-relaxed",style:{color:c.text}},[card.text]),
    el("p",{class:"text-xs font-bold",style:{color:c.text}},["Point Value: "+pts(card.points)])
  ]);
  box.style.background=`linear-gradient(to bottom, ${c.gradA}, ${c.gradB})`;
  box.style.borderColor=c.border;
  overlay.appendChild(box);
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

function cardRefPanel(){
  let search="";
  const wrap=div("max-w-lg mx-auto px-4 mt-4 pb-8",[]);

  function render(){
    wrap.innerHTML="";
    const searchWrap=div("relative mb-3",[]);
    const si=inp("w-full bg-gray-800 rounded-xl px-3 py-2 text-sm outline-none border border-gray-700 text-white","Search cards...",search,v=>{search=v;render();});
    searchWrap.appendChild(si);
    if(search){
      const x=btn("absolute right-3 top-1/2 -translate-y-1/2 text-gray-400","✕",()=>{search="";render();});
      searchWrap.appendChild(x);
    }
    wrap.appendChild(searchWrap);
    const filtered=CARDS.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
    TEAM_ORDER.forEach(team=>{
      const cards=filtered.filter(c=>c.team===team);
      if(!cards.length) return;
      const c=TC[team];
      const section=div("mb-4",[]);
      section.appendChild(el("div",{class:"text-xs font-bold uppercase tracking-widest mb-2",style:{color:c.text}},[c.icon+" "+team]));
      const list=div("space-y-1",[]);
      cards.forEach(card=>{
        const row=div("flex justify-between items-center rounded-xl px-3 py-2 border cursor-pointer",[
          el("span",{class:"font-medium text-sm text-white"},[card.name]),
          el("span",{class:"text-xs text-gray-400"},[pts(card.points)+"pts"])
        ]);
        row.style.borderColor=c.border; row.style.background=c.bg;
        row.onclick=()=>showCardModal(card);
        list.appendChild(row);
      });
      section.appendChild(list);
      wrap.appendChild(section);
    });
  }
  render();
  return wrap;
}

function screenModCards(){
  const {game,lobbyPlayers}=getState();
  let counts={}, search="", loading=false;
  const wrap=div("min-h-screen pb-10",[]);

  function teamPts(){
    const p={};
    CARDS.forEach(c=>{ if(counts[c.name]) p[c.team]=(p[c.team]||0)+c.points*counts[c.name]; });
    return p;
  }

  function render(){
    wrap.innerHTML="";
    const total=Object.values(counts).reduce((a,b)=>a+b,0);
    const diff=total-lobbyPlayers.length;
    const tp=teamPts();
    const canDeal=diff===0&&lobbyPlayers.length>=2&&!loading;

    // sticky header
    const hdr=div("bg-gray-900 px-4 py-3 border-b border-gray-800 sticky top-0 z-10",[]);
    hdr.appendChild(el("div",{class:"text-sm font-bold text-gray-300 mb-2"},[game.code+" · "+game.name]));
    const pills=div("flex gap-2 flex-wrap",[]);
    const diffLabel=diff===0&&lobbyPlayers.length>0?"✓":"";
    const countPill=el("span",{class:`text-sm px-3 py-1 rounded-full font-semibold ${diff===0&&lobbyPlayers.length>0?"bg-green-700 text-green-100":"bg-gray-700 text-gray-300"}`},
      [`👥 ${lobbyPlayers.length} · 🃏 ${total}${diff!==0?(diff>0?` (+${diff})`:`(${diff})`):" "+diffLabel}`]);
    pills.appendChild(countPill);
    TEAM_ORDER.forEach(t=>{ const p=tp[t]||0; if(!p&&t!=="Villager") return; const c=TC[t];
      const sp=el("span",{class:`text-sm px-3 py-1 rounded-full font-semibold ${c.badge}`},[c.icon+" "+(p>0?"+":"")+p]); pills.appendChild(sp); });
    hdr.appendChild(pills);
    wrap.appendChild(hdr);

    const body=div("max-w-lg mx-auto px-4 mt-4 space-y-4",[]);

    // search
    const sw=div("relative",[]);
    const si=inp("w-full bg-gray-800 rounded-xl px-3 py-2 text-sm outline-none border border-gray-700 text-white","Search cards...",search,v=>{search=v;render();});
    sw.appendChild(si);
    if(search){ const x=btn("absolute right-3 top-1/2 -translate-y-1/2 text-gray-400","✕",()=>{search="";render();}); sw.appendChild(x); }
    body.appendChild(sw);

    const filtered=CARDS.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
    TEAM_ORDER.forEach(team=>{
      const cards=filtered.filter(c=>c.team===team); if(!cards.length) return;
      const c=TC[team];
      const sec=div("mb-2",[]);
      sec.appendChild(el("div",{class:"text-xs font-bold uppercase tracking-widest mb-2",style:{color:c.text}},[c.icon+" "+team]));
      const list=div("space-y-1",[]);
      cards.forEach(card=>{
        const row=div("flex items-center gap-3 rounded-xl px-3 py-2 border",[]);
        row.style.borderColor=c.border; row.style.background=c.bg;
        const lbl=div("flex-1 cursor-pointer",[
          el("span",{class:"font-medium text-sm text-white"},[card.name]),
          el("span",{class:"text-xs ml-2 text-gray-400"},[pts(card.points)+"pts"])
        ]);
        lbl.onclick=()=>showCardModal(card);
        const cnt=counts[card.name]||0;
        const minus=btn("w-7 h-7 rounded-lg bg-gray-700 hover:bg-gray-600 text-white font-bold flex items-center justify-center","−",()=>{counts[card.name]=Math.max(0,cnt-1);render();});
        const numI=el("input",{type:"number",min:"0",class:"w-10 text-center bg-gray-800 rounded-lg text-sm py-1 border border-gray-600 text-white",value:String(cnt)});
        numI.addEventListener("change",e=>{counts[card.name]=Math.max(0,parseInt(e.target.value)||0);render();});
        const plus=btn("w-7 h-7 rounded-lg bg-gray-700 hover:bg-gray-600 text-white font-bold flex items-center justify-center","+",()=>{counts[card.name]=(cnt+1);render();});
        row.append(lbl,minus,numI,plus);
        list.appendChild(row);
      });
      sec.appendChild(list); body.appendChild(sec);
    });

    const dealBtn=btn(`w-full py-4 rounded-2xl text-lg font-bold text-white ${canDeal?"bg-green-600 hover:bg-green-500":"bg-gray-800 text-gray-500 cursor-not-allowed"}`,
      loading?"Dealing…":canDeal?"🃏 Deal Cards":diff>0?`Too many cards (+${diff})`:diff<0?`Need ${Math.abs(diff)} more cards`:"Add players first",
      async()=>{
        if(!canDeal) return;
        loading=true; render();
        const pool=[];
        CARDS.forEach(c=>{ for(let i=0;i<(counts[c.name]||0);i++) pool.push(c); });
        const shuffled=[...pool].sort(()=>Math.random()-0.5);
        await Promise.all(lobbyPlayers.map((p,i)=>
          sb.from("players").update({card_name:shuffled[i].name,card_team:shuffled[i].team,card_text:shuffled[i].text,card_points:shuffled[i].points,seat_order:i+1}).eq("id",p.id)
        ));
        await sb.from("games").update({status:"active"}).eq("id",game.id);
        setState({screen:"modgame"});
      });
    body.appendChild(dealBtn);
    wrap.appendChild(body);
  }
  render(); return wrap;
}

function screenModGame(){
  const {game}=getState();
  let players=[], search="", showDead=true, tab="players", noteEdit=null, noteVal="";
  const wrap=div("min-h-screen pb-20",[]);

  async function load(){
    const {data}=await sb.from("players").select("*").eq("game_id",game.id).eq("is_moderator",false).order("seat_order");
    players=data||[]; render();
  }
  let channel=sb.channel("modgame-"+game.id)
    .on("postgres_changes",{event:"*",schema:"public",table:"players",filter:`game_id=eq.${game.id}`},load)
    .subscribe();

  async function upd(id,patch){ await sb.from("players").update(patch).eq("id",id); await load(); }

  function render(){
    wrap.innerHTML="";
    const alive=players.filter(p=>!p.is_dead);
    const wwAlive=alive.filter(p=>p.card_team==="Werewolf").length;
    const villAlive=alive.filter(p=>p.card_team==="Villager").length;

    if(wwAlive>0&&wwAlive>=villAlive) wrap.appendChild(div("bg-red-800 px-4 py-2 text-center text-sm font-bold text-white",["🐺 Werewolves may have won!"]));
    if(wwAlive===0&&alive.length>0) wrap.appendChild(div("bg-blue-800 px-4 py-2 text-center text-sm font-bold text-white",["🏘️ Villagers have won!"]));

    // header
    const hdr=div("bg-gray-900 px-4 py-3 border-b border-gray-800 sticky top-0 z-10",[]);
    const hdrTop=div("flex justify-between items-center mb-1",[
      div("",[
        el("span",{class:"font-bold text-white"},[game.name]),
        el("span",{class:"text-yellow-400 font-mono text-sm ml-2"},[game.code])
      ]),
      btn("text-xs bg-red-900 px-3 py-1 rounded-lg border border-red-700 text-white","End Game",async()=>{
        if(confirm("End game for all players?")){
          await sb.from("games").update({status:"ended"}).eq("id",game.id);
          sb.removeChannel(channel);
          setState({screen:"home",game:null});
        }
      })
    ]);
    hdr.appendChild(hdrTop);
    hdr.appendChild(el("div",{class:"text-xs text-gray-400 mb-2"},[`${alive.length} alive · 🐺 ${wwAlive} · 🏘️ ${villAlive}`]));
    const tabs=div("flex gap-2",[]);
    ["players","cards"].forEach(t=>{
      tabs.appendChild(btn(`flex-1 py-1.5 rounded-lg text-sm font-semibold text-white ${tab===t?"bg-blue-700":"bg-gray-800"}`,
        t==="players"?"👥 Players":"📖 Cards",()=>{tab=t;render();}));
    });
    hdr.appendChild(tabs);
    wrap.appendChild(hdr);

    if(tab==="cards"){ wrap.appendChild(cardRefPanel()); return; }

    const body=div("max-w-lg mx-auto px-4 mt-4 space-y-3",[]);

    // filters
    const frow=div("flex gap-2",[]);
    const si=inp("flex-1 bg-gray-800 rounded-xl px-3 py-2 text-sm outline-none border border-gray-700 text-white","Search name or role...",search,v=>{search=v;render();});
    const deadBtn=btn(`px-3 py-2 rounded-xl text-xs font-semibold border text-white ${showDead?"border-gray-600 bg-gray-800":"border-yellow-600 bg-yellow-900"}`,
      showDead?"Hide Dead":"Show Dead",()=>{showDead=!showDead;render();});
    frow.append(si,deadBtn); body.appendChild(frow);

    const filtered=players.filter(p=>{
      if(!showDead&&p.is_dead) return false;
      if(search&&!p.name.toLowerCase().includes(search.toLowerCase())&&!(p.card_name||"").toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });

    filtered.forEach(p=>{
      const c=TC[p.card_team]||TC.Neutral;
      const warn=DEATH_WARNINGS[p.card_name];
      const card={name:p.card_name,team:p.card_team,text:p.card_text,points:p.card_points};
      const borderColor=p.is_dead?"#374151":p.marked_for_death?"#f97316":c.border;
      const row=div("rounded-2xl border-2 p-3 bg-gray-900",[]); row.style.borderColor=borderColor;
      if(p.is_dead) row.style.opacity="0.5";

      const inner=div("flex items-start gap-3",[]);
      const info=div("flex-1 min-w-0",[]);

      const nameRow=div("flex items-center gap-2 flex-wrap",[]);
      nameRow.appendChild(el("span",{class:`font-bold ${p.is_dead?"line-through text-gray-500":"text-white"}`},[p.name]));
      if(p.marked_for_death&&!p.is_dead) nameRow.appendChild(el("span",{class:"text-xs bg-orange-800 text-orange-200 px-2 py-0.5 rounded-full"},["☠️ Marked"]));
      if(p.is_dead) nameRow.appendChild(el("span",{class:"text-xs bg-gray-700 text-gray-400 px-2 py-0.5 rounded-full"},["💀 Dead"]));
      info.appendChild(nameRow);

      const cardBtn=div("flex items-center gap-1 mt-0.5 cursor-pointer",[pill(p.card_team),el("span",{class:"ml-1 text-sm text-gray-300"},[p.card_name||""])]);
      cardBtn.onclick=()=>showCardModal(card);
      info.appendChild(cardBtn);
      if(p.notes) info.appendChild(el("p",{class:"text-xs text-yellow-300 mt-1 italic truncate"},["📝 "+p.notes]));

      const actions=div("flex flex-col gap-1.5 items-end shrink-0",[]);
      if(warn) { const wb=btn("text-yellow-400 text-lg","⚠️",()=>alert(warn)); actions.appendChild(wb); }
      if(NOTE_ROLES.includes(p.card_name)&&!p.is_dead){
        actions.appendChild(btn("text-blue-400 text-sm","📝",()=>{ noteEdit=noteEdit===p.id?null:p.id; noteVal=p.notes||""; render(); }));
      }
      if(!p.is_dead){
        actions.appendChild(btn(`text-xs px-2 py-1 rounded-lg font-semibold border text-white ${p.marked_for_death?"border-orange-500 bg-orange-900":"border-gray-600 bg-gray-800"}`,
          p.marked_for_death?"Unmark":"Mark ☠️",()=>upd(p.id,{marked_for_death:!p.marked_for_death})));
      }
      actions.appendChild(btn(`text-xs px-2 py-1 rounded-lg font-semibold border text-white ${p.is_dead?"border-green-700 bg-green-900":"border-red-700 bg-red-900"}`,
        p.is_dead?"Revive":"Kill 💀",()=>upd(p.id,{is_dead:!p.is_dead,marked_for_death:false})));
      inner.append(info,actions);
      row.appendChild(inner);

      if(noteEdit===p.id){
        const nrow=div("mt-2 flex gap-2",[]);
        const ni=inp("flex-1 bg-gray-800 rounded-lg px-2 py-1 text-sm border border-yellow-600 outline-none text-white","e.g. Lovers: Alex & Jordan",noteVal,v=>noteVal=v);
        ni.addEventListener("keydown",e=>{ if(e.key==="Enter"){upd(p.id,{notes:noteVal});noteEdit=null;} if(e.key==="Escape"){noteEdit=null;render();} });
        nrow.append(ni,
          btn("text-xs bg-yellow-700 px-2 py-1 rounded-lg text-white","Save",()=>{upd(p.id,{notes:noteVal});noteEdit=null;}),
          btn("text-xs bg-gray-700 px-2 py-1 rounded-lg text-white","✕",()=>{noteEdit=null;render();})
        );
        row.appendChild(nrow);
      }
      body.appendChild(row);
    });
    wrap.appendChild(body);
  }

  load();
  return [wrap, ()=>sb.removeChannel(channel)];
}

function screenJoin(){
  let code="", name="", loading=false;
  const wrap=div("min-h-screen flex flex-col items-center justify-center p-6 gap-5",[]);
  function render(){
    wrap.innerHTML="";
    const errEl=el("p",{class:"text-red-400 text-sm hidden"},[]);
    const ci=inp("w-full bg-gray-800 rounded-xl px-4 py-3 outline-none border border-gray-700 text-white text-center text-lg font-mono tracking-widest uppercase","GAME CODE",code,v=>{code=v.toUpperCase();});
    const ni=inp("w-full bg-gray-800 rounded-xl px-4 py-3 outline-none border border-gray-700 text-white","Your name",name,v=>name=v);

    const joinBtn=btn("w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-lg text-white",loading?"Joining…":"Join Game",async()=>{
      if(!code.trim()||!name.trim()){errEl.textContent="Enter both a game code and your name";errEl.classList.remove("hidden");return;}
      loading=true; render();
      try{
        const {data:games}=await sb.from("games").select("*").eq("code",code.trim().toUpperCase());
        const game=games?.[0];
        if(!game){errEl.textContent="Game not found. Check the code.";errEl.classList.remove("hidden");loading=false;render();return;}
        if(game.status==="ended"){errEl.textContent="That game has already ended.";errEl.classList.remove("hidden");loading=false;render();return;}
        const {data:existing}=await sb.from("players").select("id").eq("game_id",game.id).eq("name",name.trim());
        if(existing?.length){errEl.textContent="That name is already taken.";errEl.classList.remove("hidden");loading=false;render();return;}
        const {data:player}=await sb.from("players").insert({game_id:game.id,name:name.trim(),is_moderator:false}).select().single();
        setState({screen:"player",game,player});
      }catch(e){errEl.textContent=e.message;errEl.classList.remove("hidden");loading=false;render();}
    });
    wrap.append(
      div("text-center",[el("div",{class:"text-4xl mb-2"},["🙋"]),el("h2",{class:"text-2xl font-bold text-white"},["Join a Game"])]),
      div("w-full max-w-sm space-y-3",[ci,ni,errEl,joinBtn,
        btn("w-full py-2 text-gray-500 text-sm","← Back",()=>setState({screen:"home"}))
      ])
    );
  }
  render(); return wrap;
}

        row.append(
          el("span",{class:`w-2 h-2 rounded-full shrink-0 inline-block ${p.is_dead?"bg-gray-600":"bg-green-400"}`},[]),
          el("span",{class:`text-sm font-medium flex-1 ${p.is_dead?"line-through text-gray-500":"text-white"}`},[p.name])
        );
        if(p.id===initPlayer.id) row.appendChild(el("span",{class:"text-xs bg-blue-800 text-blue-200 px-2 py-0.5 rounded-full"},["You"]));
        if(p.is_dead) row.appendChild(el("span",{class:"text-xs text-gray-500"},["💀"]));
        pl.appendChild(row);
      });
      body.appendChild(pl);
    } else {
      body.appendChild(cardRefPanel());
    }
    wrap.appendChild(body);
  }

  loadGame(); loadMe(); loadPlayers();
  channels.push(
    sb.channel("pg-"+initGame.id).on("postgres_changes",{event:"UPDATE",schema:"public",table:"games",filter:`id=eq.${initGame.id}`},loadGame).subscribe(),
    sb.channel("pm-"+initPlayer.id).on("postgres_changes",{event:"UPDATE",schema:"public",table:"players",filter:`id=eq.${initPlayer.id}`},loadMe).subscribe(),
    sb.channel("pp-"+initGame.id).on("postgres_changes",{event:"*",schema:"public",table:"players",filter:`game_id=eq.${initGame.id}`},loadPlayers).subscribe()
  );

  render();
  return [wrap, ()=>channels.forEach(c=>sb.removeChannel(c))];
}

// ── SESSION PERSISTENCE ───────────────────────────────────────────────────────
const SESSION_KEY = "ww_session";

function saveSession(screen, game, player) {
  try {
    if (screen === "home" || screen === "modsetup" || screen === "join") {
      localStorage.removeItem(SESSION_KEY);
    } else {
      localStorage.setItem(SESSION_KEY, JSON.stringify({ screen, game, player }));
    }
  } catch(e) {}
}

async function restoreSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const { screen, game, player } = JSON.parse(raw);
    if (!game?.id) return false;

    // Re-fetch fresh game state
    const { data: games } = await sb.from("games").select("*").eq("id", game.id);
    const freshGame = games?.[0];
    if (!freshGame || freshGame.status === "ended") {
      localStorage.removeItem(SESSION_KEY);
      return false;
    }

    // Moderator restore
    if (screen === "modlobby" || screen === "modcards" || screen === "modgame") {
      const { data: players } = await sb.from("players").select("*").eq("game_id", freshGame.id).eq("is_moderator", false).order("seat_order");
      const targetScreen = freshGame.status === "lobby" ? "modlobby"
        : freshGame.status === "dealing" ? "modcards"
        : "modgame";
      setState({ screen: targetScreen, game: freshGame, lobbyPlayers: players || [] });
      return true;
    }

    // Player restore
    if ((screen === "player" || screen === "playerwaiting") && player?.id) {
      const { data: players } = await sb.from("players").select("*").eq("id", player.id);
      const freshPlayer = players?.[0];
      if (!freshPlayer) { localStorage.removeItem(SESSION_KEY); return false; }
      setState({ screen: "player", game: freshGame, player: freshPlayer });
      return true;
    }
  } catch(e) {}
  return false;
}

// Patch setState to also save session
const _origSetState = setState;
// Override setState to persist session on every change
function setState(patch) {
  _origSetState(patch);
  const s = getState();
  saveSession(s.screen, s.game, s.player);
}

// ── VISIBILITY REFRESH (fix for mobile sleep) ─────────────────────────────────
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    const { screen } = getState();
    // Trigger a re-render which will cause each screen's load() to re-fire
    // via the subscribe mechanism by forcing a state touch
    _origSetState({ _wake: Date.now() });
  }
});

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
async function init() {
  const restored = await restoreSession();
  if (!restored) setState({ screen: "home" });

  mount(root => {
    const {screen} = getState();
    let result;
    if(screen==="home") result=screenHome();
    else if(screen==="modsetup") result=screenModSetup();
    else if(screen==="modlobby") result=screenModLobby();
    else if(screen==="modcards") result=screenModCards();
    else if(screen==="modgame") result=screenModGame();
    else if(screen==="join") result=screenJoin();
    else if(screen==="player") result=screenPlayer();
    else result=screenHome();

    const [node, cleanup] = Array.isArray(result)?result:[result, null];
    root.appendChild(node);
    return cleanup;
  });
}

init();
</script>
